<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>$title</title>
  <link rel="stylesheet" href="$base_path/assets/style.css">
  <script>(function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;}());</script>
</head>
<body>
<button id="theme-toggle" type="button"></button>
$body

<div id="img-modal" class="modal" aria-hidden="true">
  <div class="modal-backdrop" data-close="1"></div>
  <button class="modal-nav modal-prev" type="button" aria-label="Previous"></button>
  <button class="modal-nav modal-next" type="button" aria-label="Next"></button>
  <div class="modal-content" role="dialog" aria-modal="true" aria-label="Screenshot preview">
    <button class="modal-close" type="button" data-close="1" aria-label="Close">×</button>
    <div class="modal-caption" id="modal-caption"></div>
    <img id="modal-img" alt="">
  </div>
</div>

<script>
  (function () {
    const modal = document.getElementById("img-modal");
    const modalImg = document.getElementById("modal-img");
    const modalCaption = document.getElementById("modal-caption");
    const modalClose = modal.querySelector(".modal-close");
    const modalPrev = modal.querySelector(".modal-prev");
    const modalNext = modal.querySelector(".modal-next");
    const triggers = Array.from(document.querySelectorAll("a[data-modal='image']"));
    let currentIndex = -1;
    let lastFocused = null;

    const focusable = triggers.length > 1
      ? [modalPrev, modalClose, modalNext]
      : [modalClose];

    if (triggers.length <= 1) {
      modalPrev.hidden = true;
      modalNext.hidden = true;
    }

    function updateNav() {
      if (triggers.length > 1) {
        modalPrev.hidden = currentIndex === 0;
        modalNext.hidden = currentIndex === triggers.length - 1;
      }
    }

    function showImage(index) {
      if (index < 0 || index >= triggers.length) return;
      currentIndex = index;
      const a = triggers[currentIndex];
      modalImg.src = a.getAttribute("href");
      const caption = a.getAttribute("data-caption") || "";
      modalImg.alt = caption;
      modalCaption.textContent = caption;
      updateNav();
    }

    function openModal(index) {
      lastFocused = document.activeElement;
      showImage(index);
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      modalClose.focus();
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modalImg.src = "";
      modalCaption.textContent = "";
      document.body.style.overflow = "";
      if (lastFocused) lastFocused.focus();
    }

    document.addEventListener("click", (e) => {
      const a = e.target.closest("a[data-modal='image']");
      if (a) {
        e.preventDefault();
        openModal(triggers.indexOf(a));
        return;
      }
      if (e.target.closest(".modal-prev")) { showImage(currentIndex - 1); return; }
      if (e.target.closest(".modal-next")) { showImage(currentIndex + 1); return; }
      if (e.target.closest("[data-close='1']")) { closeModal(); }
    });

    document.addEventListener("keydown", (e) => {
      if (!modal.classList.contains("open")) return;
      if (e.key === "Escape") { closeModal(); return; }
      if (e.key === "ArrowLeft") { showImage(currentIndex - 1); return; }
      if (e.key === "ArrowRight") { showImage(currentIndex + 1); return; }
      if (e.key === "Tab") {
        e.preventDefault();
        const idx = focusable.indexOf(document.activeElement);
        const next = e.shiftKey
          ? (idx - 1 + focusable.length) % focusable.length
          : (idx + 1) % focusable.length;
        focusable[next].focus();
      }
    });
  })();
</script>

<script>
  (function () {
    const btn = document.getElementById("theme-toggle");
    const root = document.documentElement;

    function isDark() {
      if (root.dataset.theme === "dark") return true;
      if (root.dataset.theme === "light") return false;
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }

    function updateButton() {
      btn.textContent = isDark() ? "Light" : "Dark";
    }

    btn.addEventListener("click", () => {
      const next = isDark() ? "light" : "dark";
      root.dataset.theme = next;
      localStorage.setItem("theme", next);
      updateButton();
    });

    updateButton();

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (!root.dataset.theme) updateButton();
    });
  })();
</script>

</body>
</html>
