name: Check for new screenshots

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Compare Taskcluster task ID
        id: compare
        run: |
          RESPONSE=$(curl -sf \
            "https://firefox-ci-tc.services.mozilla.com/api/index/v1/task/mobile.v2.firefox-ios.l10n-screenshots.latest.en-US" \
            || true)

          if [ -z "$RESPONSE" ]; then
            echo "Failed to reach Taskcluster, skipping."
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_TASK_ID=$(echo "$RESPONSE" | jq -r '.taskId')
          STORED_TASK_ID=$(cat .github/last_taskcluster_id.txt 2>/dev/null || echo "")

          echo "Current task ID : $NEW_TASK_ID"
          echo "Stored task ID  : $STORED_TASK_ID"

          if [ "$NEW_TASK_ID" != "$STORED_TASK_ID" ]; then
            echo "New screenshots detected, triggering update."
            echo "trigger=true" >> "$GITHUB_OUTPUT"
            echo "task_id=$NEW_TASK_ID" >> "$GITHUB_OUTPUT"
          else
            echo "No new screenshots."
            echo "trigger=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger update workflow
        if: steps.compare.outputs.trigger == 'true'
        run: |
          gh workflow run update-screenshots.yml --ref ${{ github.ref_name }}
          sleep 5  # Wait for the Github Actions job to start
          RUN_ID=$(gh run list --workflow=update-screenshots.yml --branch ${{ github.ref_name }} --limit=1 --json databaseId -q '.[0].databaseId')
          echo "Waiting for run $RUN_ID to complete..."
          gh run watch "$RUN_ID" --exit-status --interval 30
        env:
          GH_TOKEN: ${{ secrets.FXIOS_SCREENSHOTS_L10N }}

      - name: Store Taskcluster task ID
        if: steps.compare.outputs.trigger == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.FXIOS_SCREENSHOTS_L10N }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git pull --rebase
          echo "${{ steps.compare.outputs.task_id }}" > .github/last_taskcluster_id.txt
          git add .github/last_taskcluster_id.txt
          git commit -m "chore: update last Taskcluster task ID"
          git push
