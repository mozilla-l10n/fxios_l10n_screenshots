name: Build & deploy GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update screenshots"]
    types: [completed]
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for per-locale "latest commit" via git log
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Build site
        run: |
          python .github/scripts/build_pages.py --repo . --dest site
          test -f site/index.html
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
      - name: Notify Slack
        if: github.event_name == 'workflow_run'
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_L10N_TEST_ENG }}
          webhook-type: incoming-webhook
          payload: |
            {"text": ":screenshots: :new: A new set of screenshots for Firefox iOS is available at ${{ steps.deployment.outputs.page_url }}"}
      - name: Notify Matrix
        if: github.event_name == 'workflow_run'
        env:
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          ROOM_ID_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('!QUTQxksYMuoHwmJEHg:mozilla.org'))")
          TXN_ID=$(date +%s%N)
          curl -sf -X PUT \
            "https://matrix-client.matrix.org/_matrix/client/v3/rooms/${ROOM_ID_ENCODED}/send/m.room.message/${TXN_ID}" \
            -H "Authorization: Bearer ${MATRIX_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "{\"msgtype\": \"m.notice\", \"body\": \"A new set of screenshots for Firefox iOS is available at ${PAGE_URL}\"}"
