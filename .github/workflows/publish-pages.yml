name: Build & deploy GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update screenshots"]
    types: [completed]
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for per-locale "latest commit" via git log
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build site
        run: |
          python .github/scripts/build_pages.py --repo . --dest site
          test -f site/index.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify Slack
        if: github.event_name == 'workflow_run'
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_L10N_TEST_ENG }}
          webhook-type: incoming-webhook
          payload: |
            {"text": ":screenshots: :new: A new set of screenshots for Firefox iOS is available at ${{ steps.deployment.outputs.page_url }}"}
      - name: Notify Matrix
        if: github.event_name == 'workflow_run'
        env:
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          ROOM_ID_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('!QUTQxksYMuoHwmJEHg:mozilla.org'))")
          TXN_ID=$(date +%s%N)
          curl -sf -X PUT \
            "https://matrix-client.matrix.org/_matrix/client/v3/rooms/${ROOM_ID_ENCODED}/send/m.room.message/${TXN_ID}" \
            -H "Authorization: Bearer ${MATRIX_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "{\"msgtype\": \"m.notice\", \"body\": \"A new set of screenshots for Firefox iOS is available at ${PAGE_URL}\"}"
